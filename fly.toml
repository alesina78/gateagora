app            = "gate4-app"
primary_region = "gru"

[build]

[env]
  PORT         = "8080"
  DJANGO_DEBUG = "False"

[http_service]
  internal_port        = 8080
  force_https          = true
  auto_stop_machines   = true
  auto_start_machines  = true
  min_machines_running = 0

  [http_service.concurrency]
    type       = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory   = "512mb"
  cpu_kind = "shared"
  cpus     = 1

[deploy]
  release_command = "sh -c 'python manage.py collectstatic --noinput && python manage.py migrate --noinput'"
